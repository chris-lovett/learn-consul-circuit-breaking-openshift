apiVersion: v1
kind: ServiceAccount
metadata:
  name: traffic-generator
  namespace: circuitbreak
---
apiVersion: v1
kind: Service
metadata:
  name: traffic-generator
  namespace: circuitbreak
spec:
  selector:
    app: traffic-generator
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: circuitbreak
  labels:
    app: traffic-generator
  name: traffic-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-generator
  template:
    metadata:
      namespace: circuitbreak
      annotations:
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/transparent-proxy: "true"
      labels:
        app: traffic-generator
    spec:
      serviceAccountName: traffic-generator
      containers:
        - name: traffic-generator
          image: fortio/fortio:latest_release
          args: ["load", "-t", "0", "-qps", "20", "http://public-api:8080/api"]
          ports:
            - containerPort: 8080
              name: http-fortio
            - containerPort: 8079
              name: grpc-ping
          volumeMounts:
            - name: reports
              mountPath: /var/lib/fortio
          resources:
            limits:
              cpu: 100m
              memory: 100Mi
            requests:
              cpu: 100m
              memory: 100Mi
      volumes:
        - name: reports
          emptyDir:
            medium: Memory
