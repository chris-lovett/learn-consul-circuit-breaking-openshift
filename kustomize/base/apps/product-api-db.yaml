apiVersion: v1
kind: ServiceAccount
metadata:
  name: product-api-db
  namespace: circuitbreak
---
apiVersion: v1
kind: Service
metadata:
  name: product-api-db
  namespace: circuitbreak
spec:
  selector:
    app: product-api-db
  ports:
    - name: tcp
      port: 5432
      targetPort: 5432
---
apiVersion: consul.hashicorp.com/v1alpha1
kind: ServiceDefaults
metadata:
  name: product-api-db
  namespace: circuitbreak
spec:
  protocol: tcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-api-db
  namespace: circuitbreak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-api-db
  template:
    metadata:
      annotations:
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/transparent-proxy: "true"
      labels:
        app: product-api-db
    spec:
      serviceAccountName: product-api-db
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              value: password
            - name: POSTGRES_DB
              value: products
